name: Smart Notifications CRON

on:
  schedule:
    - cron: '0 3 * * *'   # 6 ص (UTC+3)
    - cron: '0 5 * * *'   # 8 ص (UTC+3)
    - cron: '0 6 * * *'   # 9 ص (UTC+3)
    - cron: '0 15 * * *'  # 6 م (UTC+3)
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Smart Notifications
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://financetracker-brown.vercel.app/api/smart-notifications)
          echo "Response: $response"
          if [ "$response" != "200" ]; then
            echo "❌ Failed with status $response"
            exit 1
          fi
          echo "✅ Success"
